<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Brand Gradient: Primary Blue (#3B82F6) to Accent Purple (#8B5CF6) -->
    <linearGradient id="pfBrandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Subtle Drop Shadow for Sparkle and Bolt -->
    <filter id="pfGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Deep Navy Background Card (#0B1220) with Continuous Smooth Corners -->
  <rect width="512" height="512" rx="108" ry="108" fill="#0B1220" />

  <!-- Speech Bubble 'P' Brand Mark with Gradient Fill -->
  <!-- Outer path: P-shaped speech bubble with pointer tail at bottom-left -->
  <path
    d="M 236 100
       C 316 100 376 160 376 236
       C 376 308 322 366 252 371
       L 252 372
       C 220 372 192 384 168 408
       C 152 424 136 432 128 428
       C 120 424 122 404 128 388
       C 134 372 136 356 132 342
       C 108 314 96 277 96 236
       C 96 160 156 100 236 100 Z"
    fill="url(#pfBrandGradient)"
  />

  <!-- Central Lightning Bolt (White #FFFFFF) -->
  <path
    d="M 268 152
       L 194 266
       H 244
       L 204 352
       L 286 232
       H 236
       Z"
    fill="#FFFFFF"
    filter="url(#pfGlow)"
  />

  <!-- 4-Point Sparkle Star (White #FFFFFF, Upper Right) -->
  <path
    d="M 408 80
       Q 408 108 436 108
       Q 408 108 408 136
       Q 408 108 380 108
       Q 408 108 408 80 Z"
    fill="#FFFFFF"
    filter="url(#pfGlow)"
  />
</svg>