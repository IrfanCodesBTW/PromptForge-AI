# ====================================================
# PromptForge AI — Build & Publish Automation
# ====================================================

name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (e.g., v1.5.0)'
        required: true
        type: string

jobs:
  build-and-publish:
    name: Compile & Package Electron Application
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Required Build Resources
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const required = [
              "resources/icon.png",
              "resources/icon.ico",
              "resources/icon.icns",
              "resources/installer-banner.png"
            ];
            const missing = required.filter(f => !fs.existsSync(f));
            if (missing.length > 0) {
              console.error("Missing required build resource files:", missing);
              process.exit(1);
            }
            console.log("All required resource files verified successfully.");
          '

      - name: Compile Code
        run: npm run build

      - name: Package Application Installers
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run package:win
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run package:mac
          else
            npm run package:linux
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}

      - name: Debug - List Build Outputs
        shell: bash
        run: |
          echo "=== Contents of dist directory ==="
          ls -la dist/

      - name: Generate CycloneDX SBOM (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: npm run sbom

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.deb
            dist/*.snap
            dist/*.AppImage
            bom.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
