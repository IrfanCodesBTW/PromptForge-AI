name: 🐛 Bug Report
description: Report a bug or issue with PromptForge AI.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise description of the bug.
      placeholder: Describe what happens...
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce this bug.
      placeholder: |
        1. Highlight text in Slack
        2. Press Ctrl+Shift+E
        3. See error...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: System Environment
      description: Run `npm run doctor` and copy its output here.
      placeholder: |
        - OS: Windows 11 / macOS Sonoma
        - Node version: v20.11.0
        - npm version: 10.2.4
        - Output of npm run doctor:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Application Logs
      description: Attach logs from your app data folder if available.
      placeholder: Copy paste F:/AppData/Roaming/promptforge-ai/logs/app.log contents...
    validations:
      required: false
